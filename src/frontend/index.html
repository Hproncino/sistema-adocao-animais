<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Adoção de Animais</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <h1>Sistema de Cadastro de Animais para Adoção</h1>
  <p>Facilitar a adoção responsável de cães e gatos</p>

  <p id="contador"></p>

  <h2>Cadastrar novo animal</h2>

  <form id="formAnimal">
    <input type="text" id="nome" placeholder="Nome do animal" required>

    <select id="especie">
      <option value="cao">Cão</option>
      <option value="gato">Gato</option>
    </select>

    <select id="porte" required>
      <option value="Pequeno">Pequeno</option>
      <option value="Médio">Médio</option>
      <option value="Grande">Grande</option>
    </select>

    <textarea id="descricao" placeholder="Descrição do animal"></textarea>

    <input type="file" id="foto" required>

    <button type="submit">Cadastrar</button>
  </form>

  <h2>Animais disponíveis</h2>

  <h3>Filtrar por espécie</h3>

  <button onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrar('cao')">Cães</button>
  <button onclick="filtrar('gato')">Gatos</button>

  <h3>Filtrar por porte</h3>

  <button onclick="filtrarPorte('Pequeno')">Pequeno</button>
  <button onclick="filtrarPorte('Médio')">Médio</button>
  <button onclick="filtrarPorte('Grande')">Grande</button>

  <div class="container" id="listaAnimais"></div>

  <h2>Quero adotar</h2>

  <form id="formAdotante">
    <input type="text" id="nomeAdotante" placeholder="Seu nome" required>
    <input type="text" id="telefoneAdotante" placeholder="Telefone (11) 91234-5678" maxlength="15" required>
    <select id="animalInteresse" required>
      <option value="" selected disabled>Selecione o animal de interesse</option>
    </select>

    <button type="submit">Enviar interesse</button>
  </form>

  <h2>Chat com o protetor</h2>

  <div id="chatBox" style="border:1px solid #ccc; padding:10px; height:200px; overflow-y:auto;"></div>

  <input type="text" id="mensagem" placeholder="Digite sua mensagem">
  <button onclick="enviarMensagem()">Enviar</button>

  <script src="assets/js/script.js?v=20260418b"></script>
</body>
</html>
