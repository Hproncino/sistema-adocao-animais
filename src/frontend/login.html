<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Adocao</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <i class="fas fa-paw"></i> Adote um Amigo
      </div>
      <div class="nav-actions">
        <a class="btn btn-secondary" href="index.html">Voltar</a>
      </div>
    </div>
  </nav>

  <section class="container">
    <div class="section-title">
      <h2>Entrar</h2>
      <p>Use seu email e senha</p>
    </div>

    <form id="formLogin" class="form-card">
      <div class="form-group">
        <input type="email" id="loginEmail" placeholder="Email" required>
      </div>
      <div class="form-group">
        <input type="password" id="loginPassword" placeholder="Senha" required>
      </div>
      <button type="submit" class="btn btn-primary">Entrar</button>
    </form>
  </section>

  <section class="container">
    <div class="section-title">
      <h2>Criar conta</h2>
      <p>Cadastro simples para clientes</p>
    </div>

    <form id="formRegister" class="form-card">
      <div class="form-group">
        <input type="email" id="registerEmail" placeholder="Email" required>
      </div>
      <div class="form-group">
        <input type="password" id="registerPassword" placeholder="Senha (minimo 6 caracteres)" required>
      </div>
      <button type="submit" class="btn btn-primary">Cadastrar</button>
    </form>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Sistema de Adocao de Animais. Todos os direitos reservados.</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="assets/js/login.js?v=20260504"></script>
</body>
</html>
